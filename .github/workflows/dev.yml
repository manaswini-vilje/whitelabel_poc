name: Deploy DEV (Backend + Frontend)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ✅ Debug (remove later)
      - name: Debug Secret Length
        run: echo "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND_DEV }}" | wc -c

      # 🚀 Deploy Backend
      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: whitelabel-poc-be-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND_DEV }}
          package: .

      # 🚀 Deploy Frontend
      - name: Deploy Frontend
        uses: azure/webapps-deploy@v2
        with:
          app-name: whitelabel-poc-fe-dev
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND_DEV }}
          package: .
