name: Deploy DEV (Final Working)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: whitelabel-poc-be-dev
          package: .

      - name: Deploy Frontend
        uses: azure/webapps-deploy@v2
        with:
          app-name: whitelabel-poc-fe-dev
          package: .
