name: Deploy to Azure App Service (Dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r app.py main.py bootstrap_brand_runtime.py startup.sh Procfile web.config deploy/
          cp -r requirements.txt deploy/
          cp -r src/ deploy/src/
          cp -r brands/ deploy/brands/
          cp -r data/ deploy/data/
          [ -d ".streamlit" ] && cp -r .streamlit/ deploy/.streamlit/ || true
          [ -d "samples" ] && cp -r samples/ deploy/samples/ || true
          cd deploy && zip -r ../app.zip . -x "*.pyc" "__pycache__/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
          startup-command: "sh startup.sh"
