# Builds a zip of this repo and deploys to Azure Web App for Linux.
# After deploy, the Web App must run the API process — configure Startup Command to:
#   bash startup.sh
# That script runs FastAPI (api.main:app) on $PORT so /health, /api/brand, /api/process
# match what whitelabel-poc-frontend calls. Streamlit is proxied from the same app; for
# Streamlit WebSockets (/_stcore/stream), enable: Azure Portal → Web App → Configuration →
# General settings → Web sockets = On.
name: Deploy to Azure App Service (Dev)

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    environment: Dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment package
        run: |
          zip -r app.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x ".env"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME_DEV }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}
          package: app.zip
